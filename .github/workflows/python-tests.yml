name: Python Tests

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # You can add services like redis or postgres here if needed
      # redis:
      #   image: redis
      #   ports:
      #     - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-cov httpx fastapi google-generativeai pydantic-settings
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # If there are other dependency files, install them too
        if [ -f core/pyproject.toml ]; then pip install core/; fi

    - name: Run tests with pytest
      env:
        PYTHONPATH: ".:living_docs_engine:core"
        # API keys should be added to GitHub Secrets
        # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        pytest tests/ --cov=./ --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
